<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Carousel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="carousel-wrapper">
        <button class="scroll-btn prev"></button>
        <div class="carousel">
            <div class="spacer"></div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-info">
                    <div class="card-text">
                        <h3 class="card-title">Project Name One</h3>
                        <p class="card-description">Short description of the project goes here.</p>
                    </div>
                    <a class="card-link" href="#">View Project</a>
                </div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-info">
                    <div class="card-text">
                        <h3 class="card-title">Project Name Two</h3>
                        <p class="card-description">Short description of the project goes here.</p>
                    </div>
                    <a class="card-link" href="#">View Project</a>
                </div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-info">
                    <div class="card-text">
                        <h3 class="card-title">Project Name Three</h3>
                        <p class="card-description">Short description of the project goes here.</p>
                    </div>
                    <a class="card-link" href="#">View Project</a>
                </div>
            </div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
            <div class="card">7</div>
            <div class="card">8</div>
            <div class="spacer"></div>
        </div>
        <button class="scroll-btn next"></button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
